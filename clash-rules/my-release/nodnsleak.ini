[custom]
; ==========================================================================================================================
; 000-Muti-ALL-NoDns-sblable-offline
; 解决DNS泄露，无分流群组
; tips:不支持负载均衡-轮询的策略定制,需要手动修改: strategy: consistent-hashing ==改为==> strategy: round-robin
