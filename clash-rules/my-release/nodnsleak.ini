custom_proxy_group=♻️ 手动选择`select`[]DIRECT`(.*)

; 纯自动选择: 超时自动切换(300,5,50--每隔300秒测试一次，测速超时为5s，切换节点的延迟容差为50ms)
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,5,50

; 拒绝
custom_proxy_group=🛑 全球拦截 * 🎯 全球直连 * ⛔️ 广告拦截 * 🚫 运营劫持`select`[]REJECT`[]DIRECT

