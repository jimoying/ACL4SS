[custom]
; 解决DNS泄露，无分流群组
; ==========================================================================================================================
mixed-port: 7890
socks-port: 7891
port: 7892

; ==========================================================================================================================
;ruleset=♻️ github,[]DOMAIN-KEYWORD,github,no-resolve

;http
;未测试成功!!!
;ruleset=♻️ github,./TestCustomDirect.list

;未测试成功!!!
;ruleset=!!import:snippets/rulesets.txt

ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,xn--ngstr-lra8j.com
ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,services.googleapis.cn

; ========================================================================================================================== 测试1
;custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]DIRECT`.*
;custom_proxy_group=🚀 节点选择`select`[]⚖️ 负载均衡-轮询`[]⚖️ 负载均衡-散列`[]♻️ 自动选择`[]DIRECT`.*
;custom_proxy_group=🚀 节点选择`select`[]⚖️ 负载均衡-轮询`[]⚖️ 负载均衡-散列`[]♻️ 自动选择`[]DIRECT`
;custom_proxy_group=🚀 节点选择`select`[]⚖️ 负载均衡-轮询`[]⚖️ 负载均衡-散列`[]♻️ 自动选择`♻️ github`[]DIRECT`(香港|HK)

;custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

;自定义策略组
;custom_proxy_group=♻️ github`url-test`.*`http://www.gstatic.com/generate_204`300,,50
;custom_proxy_group=♻️ github`url-test`(香港|HK)`http://www.gstatic.com/generate_204`300,,50

; 想修改 strategy=round-robin, 未成功! 使用本地修改吧!
custom_proxy_group=⚖️ 负载均衡-轮询111`load-balance`round-robin`(香港)`http://www.gstatic.com/generate_204`300,,50

; 简单表达式
custom_proxy_group=⚖️ 负载均衡-轮询222`load-balance`(香港.*\{Ver10\})`http://www.gstatic.com/generate_204`300,,50
; 复杂表达式
custom_proxy_group=🚀 节点选择`select`('(?<=name:\s)([^,]+)(?=,\s*(type|server|uuid))')
; 第2条订阅链接里的香港节点
custom_proxy_group=⚖️ 负载均衡-散列444`load-balance`!!GROUPID=1!!(香港)`http://www.gstatic.com/generate_204`300,,50

;测试成功: 从添加的订阅链接中过滤第二条订阅链接中的香港节点
;custom_proxy_group=⚖️ 负载均衡-散列-测试444`load-balance`!!GROUPID=1!!(香港)`http://www.gstatic.com/generate_204`300,,50

;测试成功:
;# 匹配整行 作为key!!! ==> 复杂正则表达式即匹配整行
;# 匹配代理节点名字 作为key!!! ==> 简单正则表达式即匹配代理节点名字
;# 表示创建一个叫 节点选择 的 select 策略组,并向其中**依次**添加名字不包含'美国'或'日本'的节点
;custom_proxy_group=⚖️ 负载均衡-散列-测试555`load-balance`(^(?!.*(美国|日本)).*)`http://www.gstatic.com/generate_204`300,,50

; ========================================================================================================================== 测试2 使用`字面量正则`方式提取
#### 不支持`使用字面量正则方式提取`
# custom_proxy_group=♻️ 手动选择testttttttt`select`[]DIRECT`(/香港.*\{Ver10\}/i)
# ````
# 输出结果:
#   - name: ♻️ 手动选择testttttttt
#     type: select
#     proxies:
#       - DIRECT
# ````
; ==========================================================================================================================
enable_rule_generator=true
overwrite_original_rules=true