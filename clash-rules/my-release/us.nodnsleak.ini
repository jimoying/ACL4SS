[custom]
; 解决DNS泄露，无分流群组
; ==========================================================================================================================
; ==========================================================================================================================
;自定义规则
ruleset=Home手动选择,[]IP-CIDR,192.168.1.1/16,no-resolve
ruleset=♻️ github,[]DOMAIN-KEYWORD,github,no-resolve
ruleset=⚖️ 负载均衡-轮询,[]DOMAIN-KEYWORD,youtube,no-resolve
ruleset=⚖️ 负载均衡-轮询,[]DOMAIN-KEYWORD,*youtube*,no-resolve

;http
ruleset=DIRECT,https://raw.githubusercontent.com/jimoying/ACL4SS/refs/heads/main/clash-rules/my-release/CustomDirect.list

ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,xn--ngstr-lra8j.com
ruleset=🚀 节点选择,[]DOMAIN-SUFFIX,services.googleapis.cn
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/GoogleCNProxyIP.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaMedia.list
ruleset=REJECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=REJECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaIp.list
ruleset=DIRECT,[]GEOIP,CN,no-resolve
ruleset=🚀 节点选择,[]FINAL

; ==========================================================================================================================
; Format: Group_Name`url-test|fallback|load-balance`Rule_1`Rule_2`...`test_url`interval[,timeout][,tolerance]
; [外部配置](https://github.com/tindy2013/subconverter/blob/master/README-cn.md#%E5%A4%96%E9%83%A8%E9%85%8D%E7%BD%AE)

;custom_proxy_group=🚀 节点选择`select`[]⚖️ 负载均衡-轮询`[]⚖️ 负载均衡-散列`[]♻️ 自动选择`[]DIRECT`.*
;custom_proxy_group=🚀 节点选择`select`[]⚖️ 负载均衡-轮询`[]⚖️ 负载均衡-散列`[]♻️ 自动选择`[]DIRECT`
custom_proxy_group=🚀 节点选择`select`[]⚖️ 负载均衡-轮询`[]⚖️ 负载均衡-散列`[]♻️ 自动选择`♻️ github`[]DIRECT`(美国|US)

custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

;自定义策略组
;custom_proxy_group=♻️ github`url-test`.*`http://www.gstatic.com/generate_204`300,,50
;custom_proxy_group=♻️ github`url-test`[]①香港??`[]②香港??`[]③香港??`[]④香港??`[]⑤香港??`[]GB_42`[]ss-yun-9pj2tu70`http://www.gstatic.com/generate_204`300,,50
;custom_proxy_group=♻️ github`url-test`(①香港|②香港|③香港|④香港|⑤香港)`[]GB_42`[]ss-yun-9pj2tu70`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=♻️ github`select`(①香港|②香港|③香港|④香港|⑤香港)`(GB_42)`(ss-yun-9pj2tu70)`[]DIRECT

;strategy: round-robin
custom_proxy_group=⚖️ 负载均衡-轮询`load-balance`(美国|US)`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=⚖️ 负载均衡-散列`load-balance`(美国|US)`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=Home手动选择`select`[]DIRECT`(p2p)

; ==========================================================================================================================
enable_rule_generator=true
overwrite_original_rules=true